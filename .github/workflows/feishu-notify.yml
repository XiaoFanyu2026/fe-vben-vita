name: Notify Feishu Card On Merge Main

on:
  pull_request_target:
    types: [ closed ]
    branches:
      - main

permissions:
  contents: read

jobs:
  notify:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Build payload
        env:
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_TIME: ${{ github.event.pull_request.closed_at }}
        run: |
          python3 - <<'PY'
          import os, json, time, hmac, base64, hashlib

          timestamp = str(int(time.time()))
          secret = os.environ["FEISHU_SECRET"]

          string_to_sign = f"{timestamp}\n{secret}".encode("utf-8")
          sign = base64.b64encode(
              hmac.new(string_to_sign, digestmod=hashlib.sha256).digest()
          ).decode("utf-8")

          payload = {
              "timestamp": timestamp,
              "sign": sign,
              "msg_type": "interactive",
              "card": {
                  "config": {
                      "wide_screen_mode": True,
                      "enable_forward": True
                  },
                  "header": {
                      "template": "green",
                      "title": {
                          "tag": "plain_text",
                          "content": "GitHub 合并通知"
                      }
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**仓库**：{os.environ['REPO']}\n"
                                  f"**PR**：#{os.environ['PR_NUMBER']} {os.environ['PR_TITLE']}\n"
                                  f"**关键词**：GitHub"
                              )
                          }
                      },
                      {
                          "tag": "div",
                          "fields": [
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**目标分支**\n{os.environ['BASE_REF']}"
                                  }
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**来源分支**\n{os.environ['HEAD_REF']}"
                                  }
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**发起人**\n{os.environ['PR_AUTHOR']}"
                                  }
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**合并人**\n{os.environ['MERGED_BY']}"
                                  }
                              }
                          ]
                      },
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": f"**合并时间**：{os.environ['MERGE_TIME']}"
                          }
                      },
                      {
                          "tag": "action",
                          "actions": [
                              {
                                  "tag": "button",
                                  "text": {
                                      "tag": "plain_text",
                                      "content": "查看 PR"
                                  },
                                  "type": "primary",
                                  "url": os.environ["PR_URL"]
                              }
                          ]
                      }
                  ]
              }
          }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          PY

      - name: Print payload
        run: cat payload.json

      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -v -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @payload.json